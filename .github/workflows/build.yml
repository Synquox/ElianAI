name: Build ElianAI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Package IPA
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Install tools
      run: |
        brew install xcodegen
        gem install xcpretty
      
    - name: Generate Xcode Project
      run: xcodegen generate
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Resolve Swift packages
      run: |
        xcodebuild -resolvePackageDependencies \
          -project ElianAI.xcodeproj \
          -scheme ElianAI
    
    - name: Build for iOS Device
      run: |
        xcodebuild build \
          -project ElianAI.xcodeproj \
          -scheme ElianAI \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="-" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          SWIFT_STRICT_CONCURRENCY=minimal \
          | xcpretty --color && exit ${PIPESTATUS[0]}
    
    - name: Package IPA
      run: |
        APP_PATH=$(find build/Build/Products -name "ElianAI.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: ElianAI.app not found in build products"
          find build/Build/Products -type d -maxdepth 3
          exit 1
        fi
        echo "Found app at: $APP_PATH"
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        zip -r ElianAI.ipa Payload
        rm -rf Payload
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ElianAI
        path: ElianAI.ipa
        if-no-files-found: error
